########################################
# Ora2Pg-Go standalone config
########################################

# Oracle connection string in Ora2Pg style.
# Host will be overridden by --oracle-host if provided.
ORACLE_DSN      dbi:Oracle:host=localhost;port=1521;service_name=XEPDB1
ORACLE_USER     app
ORACLE_PWD      app

# Schema selection.
SCHEMA          APP
EXPORT_SCHEMA   1
CREATE_SCHEMA   0

# Package export mode: 1 = schema per package, 0 = prefix naming.
PACKAGE_AS_SCHEMA 1

# Default export type (overridden by --type).
TYPE            TABLE
PG_VERSION      15

# Kept for compatibility with Ora2Pg-style config.
OUTPUT_DIR      ./output
OUTPUT          ora2pg.sql

# Optional knobs.
PG_NUMERIC_TYPE 1
ESTIMATE_COST   0
DEBUG           0
PARALLEL_TABLES 1
